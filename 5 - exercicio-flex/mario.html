<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER MÁRIO</title>
    <link rel="stylesheet" href="styyle.css">
    <link rel="stylesheet" href="flex.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Poller+One&display=swap');
    </style>
<body>

    <div id="logo" class="logo-m">
        <img src="/5 - exercicio-flex/imagens/logo.png" alt="">
    </div>
    
        <h1>Escolha o seu personagem!</h1>

            <div id="personagens">
                <div class="personagem">
                    <img src="/5 - exercicio-flex/imagens/personagens/luigi.jpg" alt="Luigi">
                    <h2>LUIGI</h2>
                </div>
                <div class="personagem">
                    <img src="/5 - exercicio-flex/imagens/personagens/mario.jpg" alt="Mario">
                    <h2>MARIO</h2>
                </div>
                <div class="personagem">
                    <img src="/5 - exercicio-flex/imagens/personagens/toad.jpg" alt="Toad">
                    <h2>TOAD</h2>
                </div>
                <div class="personagem">
                    <img src="/5 - exercicio-flex/imagens/personagens/yoshi.jpg" alt="Yoshi">
                    <h2>YOSHI</h2>
                </div>
            </div>
            <div class="linha-verde"></div>
            <div id="poder">
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/cogumelo-azul.jpg" alt="">
                </div>
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/cogumelo-verde.jpg" alt="">
                </div>
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/cogumelo-vermelho.jpg" alt="">
                </div>
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/cogumelo-voador.jpg" alt="">
                </div>
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/estrela.jpg" alt="">
                </div>
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/flor-fogo.jpg" alt="">
                </div>
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/flor-gelo.jpg" alt="">
                </div>
                <div class="poderes">
                    <img src="/5 - exercicio-flex/imagens/poderes/pinguim.jpg" alt="">
                </div>
            </div>
            <h1 id="escolha">Enfrente os inimigos!</h1>
            <div id="inimigos">
                <div class="inimigo mario-inimigo">
                    <img id="heroi" src="/5 - exercicio-flex/imagens/personagens/mario.jpg" alt="">
                </div>
                <div class="inimigo">
                    <img src="/5 - exercicio-flex/imagens/viloes/bowser.jpg" alt="">
                </div>
                <div class="inimigo">
                    <img src="/5 - exercicio-flex/imagens/viloes/drybones.jpg" alt="">
                </div>
                <div class="inimigo">
                    <img src="/5 - exercicio-flex/imagens/viloes/waluigi.jpg" alt="">
                </div>
                <div class="inimigo">
                    <img src="/5 - exercicio-flex/imagens/viloes/wario.jpg" alt="">
                </div>
            </div>
            <div class="linha"></div>
            <h1>E salve o reino!</h1>
            <div id="reino">
                <div class="final princesa esquerda">
                    <img src="/5 - exercicio-flex/imagens/final/daisy.png" alt="">
                </div>
                <div class="final castelo">
                    <img src="/5 - exercicio-flex/imagens/final/castelo.png" alt="">
                </div>
                <div class="final princesa direita">
                    <img src="/5 - exercicio-flex/imagens/final/peach.png" alt="">
                </div>
            </div>
            <div class="outra-linha"></div>
            
</body>
</html>
